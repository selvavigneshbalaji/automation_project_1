name: Automation Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest -v --html=reports/smoke_report.html --self-contained-html
      - name: Upload HTML Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
            name: html-reports-${{ matrix.python-version }}-${{ matrix.browser }}
            path: reports/